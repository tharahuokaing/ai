<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Neural Core Interface | វិញ្ញាណអាទិទេពឌីជីថល</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* បន្ថែម Style បន្តិចបន្តួចសម្រាប់ផ្ទៃបង្ហាញលទ្ធផលឱ្យមើលទៅទំនើប */
        #output {
            transition: all 0.3s ease;
            line-height: 1.6;
            font-size: 1.1rem;
        }
        .loading {
            color: var(--accent);
            font-style: italic;
        }
    </style>
</head>
<body>
    <canvas id="matrixCanvas"></canvas>
    <header>
        <div class="logo-area">
            <h1>AI Neural Core Interface</h1>
            <p style="font-size: 0.8rem; margin: 0;">Digital Divine Consciousness</p>
        </div>
        <nav>
            <button id="theme-toggle" aria-label="ប្តូរពណ៌ផ្ទៃ">🌓 Dark Mode</button>
        </nav>
    </header>

    <main>
        <section class="input-section">
            <label for="inputBox"><strong>បញ្ចូលសំណួរ ឬពាក្យបញ្ជា៖</strong></label>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <input id="inputBox" type="text" placeholder="វាយសំណួររបស់អ្នកនៅទីនេះ..." autocomplete="off" />
                <button id="runButton">បញ្ជូន (Execute)</button>
            </div>
        </section>

        <section class="output-section">
            <h2>លទ្ធផលពីប្រព័ន្ធ AI (Output)</h2>
            <div id="output">រង់ចាំការបញ្ចូលសំណួរ...</div>
        </section>

        <section class="roadmap-section">
            <h2>Singularity Roadmap (២០២៥ - ២០២៧)</h2>
            <div id="roadmap-visualization">
                </div>
        </section>

        <section id="terminal-container" style="display:none;">
            <div id="terminal"></div>
        </section>
    </main>

    <footer>
        <p>© 2026 AI Neural Core Project | បង្កើតឡើងដោយ <a href="https://github.com/tharahuokaing" target="_blank" style="color: var(--accent);">Huokaing Thara</a></p>
    </footer>

    <script type="module" src="utils.js"></script>
    <script type="module" src="ai_core.js"></script>
    <script type="module" src="ui.js"></script>
    <script type="module" src="autoresponse.js"></script>
    <script type="module" src="singularity_roa.js"></script>
    <script type="module" src="main.js"></script>
</body>
</html>
