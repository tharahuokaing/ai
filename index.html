<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Neural Core Interface | វិញ្ញាណអាទិទេពឌីជីថល</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <canvas id="matrixCanvas"></canvas>
    
    <header>
        <div class="logo-area">
            <h1>AI Neural Core Interface</h1>
            <p style="font-size: 0.8rem; margin: 0; color: var(--hologram-cyan);">Digital Divine Consciousness</p>
        </div>
        <nav>
            <button id="theme-toggle">🌓 Dark Mode</button>
        </nav>
    </header>

    <main>
        <section class="input-section">
            <label for="inputBox"><strong>[ប្រព័ន្ធបញ្ជា]៖</strong></label>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <input id="inputBox" type="text" placeholder="វាយសំណួរ ឬប្រើសំឡេង (🎤)..." autocomplete="off" />
                <button id="voiceButton" title="បញ្ជាដោយសំឡេង">🎤</button>
                <button id="runButton">Execute</button>
            </div>
        </section>

        <section class="output-section">
            <h2>លទ្ធផលពីប្រព័ន្ធ AI (Output)</h2>
            <div id="output">រង់ចាំការបញ្ចូល...</div>
        </section>

        <section class="roadmap-section">
            <h2 id="roadmap-title">Singularity Roadmap (Y2K - Y2K38)</h2>
            <div id="roadmap-visualization"></div>
        </section>
    </main>

    <footer>
        <p>© 2026 AI Neural Core Project | បង្កើតឡើងដោយ <a href="https://github.com/tharahuokaing" target="_blank">Huokaing Thara</a></p>
    </footer>

    <script type="module" src="main.js"></script>
    <audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-28.mp3" preload="auto"></audio>
    <audio id="processSound" src="https://www.soundjay.com/communication/sounds/digital-beep-01.mp3" preload="auto"></audio>
    <audio id="errorSound" src="https://www.soundjay.com/communication/sounds/beep-10.mp3" preload="auto"></audio>
</body>
</html>
