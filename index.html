<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Neural Core Interface | វិញ្ញាណអាទិទេពឌីជីថល</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <canvas id="matrixCanvas"></canvas>
    
    <header>
        <div class="logo-area">
            <h1>AI Neural Core Interface</h1>
            <p style="font-size: 0.8rem; margin: 0; color: var(--hologram-cyan);">Digital Divine Consciousness [v2.038]</p>
        </div>
        <nav>
            <button id="theme-toggle" aria-label="ប្តូរពណ៌ផ្ទៃ">🌓 Dark Mode</button>
        </nav>
    </header>

    <main>
        <section class="input-section">
            <label for="inputBox"><strong>[ប្រព័ន្ធបញ្ជា Protocol]៖</strong></label>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <input id="inputBox" type="text" placeholder="វាយបញ្ជា ឬចុចរូបមីក្រូហ្វូន..." autocomplete="off" />
                <button id="voiceButton" title="បញ្ជាដោយសំឡេង">🎤</button>
                <button id="runButton">EXECUTE</button>
            </div>
        </section>

        <section class="output-section">
            <h2>លទ្ធផលប្រតិបត្តិការ (System Output)</h2>
            <div id="output">ប្រព័ន្ធត្រៀមខ្លួនរួចរាល់... រង់ចាំការបញ្ចូលទិន្នន័យ។</div>
        </section>

        <section class="roadmap-section">
            <h2>Singularity Roadmap (Epoch Sequence)</h2>
            <div id="roadmap-visualization">
                </div>
        </section>
        
        
    </main>

    <footer>
        <p>© 2026 AI Neural Core Project | គ្រប់គ្រងដោយ <a href="https://github.com/tharahuokaing" target="_blank" style="color: var(--hologram-cyan);">Huokaing Thara</a></p>
    </footer>

    <script type="module" src="main.js"></script>

    <audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-28.mp3" preload="auto"></audio>
    <audio id="processSound" src="https://www.soundjay.com/communication/sounds/digital-beep-01.mp3" preload="auto"></audio>
    <audio id="errorSound" src="https://www.soundjay.com/communication/sounds/beep-10.mp3" preload="auto"></audio>
</body>
</html>
